[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xs2n"
version = "0.1.0"
description = "CLI pipeline tools for timeline summarization"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "typer>=0.12.3",
  "twikit>=2.3.3",
  "tenacity>=9.1.4",
  "playwright>=1.58.0",
  "browser-cookie3>=0.20.1",
  "openai>=1.68.0",
  "pydantic>=2.10.6",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
]

[project.scripts]
xs2n = "xs2n.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
